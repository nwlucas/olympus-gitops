apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: redpanda-console
  namespace: platform
  annotations:
    external-dns.alpha.kubernetes.io/hostname: kafka.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.ai-hub.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kafka.nwlnexus.net`)
      kind: Rule
      services:
        - name: redpanda-console
          port: 8080
  tls:
    certResolver: default
