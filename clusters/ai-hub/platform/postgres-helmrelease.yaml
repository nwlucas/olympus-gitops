apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: postgresql
      version: ">=16.0.0 <17.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: platform
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    auth:
      existingSecret: platform-credentials
      secretKeys:
        adminPasswordKey: postgres-password
    primary:
      persistence:
        existingClaim: postgres-data
