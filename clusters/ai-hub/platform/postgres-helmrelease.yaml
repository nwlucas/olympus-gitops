apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: postgresql
      version: "16.7.27"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: platform
  install:
    remediation:
      retries: 3
    timeout: 15m
  upgrade:
    remediation:
      retries: 3
    timeout: 15m
  values:
    image:
      tag: latest
    auth:
      existingSecret: platform-credentials
      secretKeys:
        adminPasswordKey: postgres-password
      database: sentry
    primary:
      persistence:
        existingClaim: postgres-data
