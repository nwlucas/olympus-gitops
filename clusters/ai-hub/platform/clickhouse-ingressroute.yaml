apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: clickhouse-play
  namespace: platform
  annotations:
    external-dns.alpha.kubernetes.io/hostname: clickhouse.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.ai-hub.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`clickhouse.nwlnexus.net`)
      kind: Rule
      services:
        - name: clickhouse
          port: 8123
  tls:
    certResolver: default
