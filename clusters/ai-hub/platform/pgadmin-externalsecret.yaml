apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pgadmin-credentials
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: pgadmin-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: email
      remoteRef:
        key: olympus-pgadmin
        property: username
    - secretKey: password
      remoteRef:
        key: olympus-pgadmin
        property: password
