apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: platform
data:
  experimental_json.xml: |
    <clickhouse>
      <profiles>
        <default>
          <allow_experimental_json_type>1</allow_experimental_json_type>
          <allow_experimental_dynamic_type>1</allow_experimental_dynamic_type>
          <allow_experimental_workload_classification>1</allow_experimental_workload_classification>
        </default>
      </profiles>
    </clickhouse>
