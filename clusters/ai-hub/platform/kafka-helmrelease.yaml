apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: kafka
      version: ">=31.0.0 <32.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: platform
  values:
    kraft:
      enabled: true
    zookeeper:
      enabled: false
    replicaCount: 1
    persistence:
      existingClaim: kafka-data
    extraConfig: |
      auto.create.topics.enable=true
