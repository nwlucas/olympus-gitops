apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: kafka
      version: "31.5.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: platform
  install:
    remediation:
      retries: 3
    timeout: 15m
  values:
    kraft:
      enabled: true
    zookeeper:
      enabled: false
    replicaCount: 1
    persistence:
      existingClaim: kafka-data
    extraConfig: |
      auto.create.topics.enable=true
