apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: redis
      version: ">=20.0.0 <21.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: platform
  values:
    auth:
      existingSecret: platform-credentials
      existingSecretPasswordKey: redis-password
    master:
      persistence:
        existingClaim: redis-data
    replica:
      replicaCount: 0
