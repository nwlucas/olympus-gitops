apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: redis
      version: "20.13.4"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: platform
  install:
    remediation:
      retries: 3
    timeout: 15m
  values:
    image:
      tag: latest
    auth:
      existingSecret: platform-credentials
      existingSecretPasswordKey: redis-password
    master:
      persistence:
        existingClaim: redis-data
    replica:
      replicaCount: 0
