apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: pgadmin4
      sourceRef:
        kind: HelmRepository
        name: runix
        namespace: platform
  values:
    env:
      email: nwilliams-lucas@nwlnexus.net
      password: admin
    ingress:
      enabled: false
    persistentVolume:
      enabled: true
      existingClaim: pgadmin-data
    serverDefinitions:
      enabled: true
      servers:
        ai-hub:
          Name: ai-hub-postgres
          Group: ai-hub
          Port: 5432
          Username: postgres
          Host: postgresql.platform.svc.cluster.local
          SSLMode: prefer
          MaintenanceDB: postgres
