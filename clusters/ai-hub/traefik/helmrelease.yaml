apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  values:
    deployment:
      replicas: 1

    service:
      type: ClusterIP

    ports:
      web:
        port: 80
        expose:
          default: true
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        port: 443
        expose:
          default: true
        http:
          tls:
            enabled: true

    api:
      dashboard: true
      insecure: true

    logs:
      general:
        level: INFO
