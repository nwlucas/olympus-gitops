deployment:
  replicas: 1

service:
  type: ClusterIP

ports:
  web:
    port: 80
    expose:
      default: true
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    port: 443
    expose:
      default: true
    http:
      tls:
        enabled: true

api:
  dashboard: true
  insecure: true

logs:
  general:
    level: INFO
