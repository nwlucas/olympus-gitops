deployment:
  replicas: 1

service:
  type: ClusterIP

ports:
  web:
    port: 80
    expose:
      default: true
    redirectTo:
      port: websecure
  websecure:
    port: 443
    expose:
      default: true
    tls:
      enabled: true

api:
  dashboard: true
  insecure: true

logs:
  general:
    level: INFO
