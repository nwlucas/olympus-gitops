apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  annotations:
    external-dns.alpha.kubernetes.io/hostname: traefik.hub.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.ai.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.hub.nwlnexus.net`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: traefik-dashboard-tls
