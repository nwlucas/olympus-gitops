apiVersion: trident.qnap.io/v1
kind: TridentBackendConfig
metadata:
  name: qnap-iscsi-backend
  namespace: trident
spec:
  version: 1
  storageDriverName: qnap-nas
  backendName: qnap-iscsi-backend
  userCHAP: true
  credentials:
    name: qnap-trident-backend-creds
  debugTraceFlags:
    method: true
  storage:
    - serviceLevel: "Storage Pool 1"
      labels:
        location: ai-hub
