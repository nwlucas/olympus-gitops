apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sentry
  namespace: sentry
  annotations:
    external-dns.alpha.kubernetes.io/hostname: sentry.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.ai-hub.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    # Higher-priority route: SPA entrypoints must never be cached by Cloudflare
    # (unversioned path, content changes every upgrade — see middleware.yaml).
    - match: Host(`sentry.nwlnexus.net`) && PathPrefix(`/_static/dist/sentry/entrypoints/`)
      kind: Rule
      priority: 100
      middlewares:
        - name: sentry-entrypoints-nocache
      services:
        - name: sentry-web
          port: 9000
    - match: Host(`sentry.nwlnexus.net`)
      kind: Rule
      services:
        - name: sentry-web
          port: 9000
  tls:
    secretName: sentry-tls
