apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentry
  namespace: sentry
spec:
  interval: 1h
  chart:
    spec:
      chart: sentry
      version: "31.7.0"
      sourceRef:
        kind: HelmRepository
        name: sentry
        namespace: sentry
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: sentry-secrets
      valuesKey: system-secret-key
      targetPath: sentry.systemSecretKey
    - kind: Secret
      name: sentry-secrets
      valuesKey: postgres-password
      targetPath: externalPostgresql.password
    - kind: Secret
      name: sentry-secrets
      valuesKey: clickhouse-password
      targetPath: externalClickhouse.password
    - kind: Secret
      name: sentry-secrets
      valuesKey: smtp-password
      targetPath: mail.password
    - kind: Secret
      name: sentry-secrets
      valuesKey: admin-username
      targetPath: user.email
    - kind: Secret
      name: sentry-secrets
      valuesKey: admin-password
      targetPath: user.password
  values:
    postgresql:
      enabled: false
    redis:
      enabled: false
    kafka:
      enabled: false
    clickhouse:
      enabled: false
    externalPostgresql:
      host: postgresql.platform.svc.cluster.local
      port: 5432
      username: postgres
      database: sentry
    externalRedis:
      host: redis-master.platform.svc.cluster.local
      port: 6379
      existingSecret: sentry-secrets
      existingSecretKey: redis-password
    externalKafka:
      host: kafka.platform.svc.cluster.local
      port: 9092
    externalClickhouse:
      host: clickhouse.platform.svc.cluster.local
      httpPort: 8123
      tcpPort: 9000
      username: default
      clusterName: sentry-clickhouse
    nginx:
      enabled: false
    mail:
      host: smtp.resend.com
      port: 587
      username: resend
      useTls: true
      from: sentry@nwlnexus.io
    user:
      create: true
      superuser: true
      # email and password injected via valuesFrom (user.email, user.password)
    # Canonical external URL — sets system.url-prefix in config.yml. Required so
    # Sentry knows it is served at https://sentry.nwlnexus.net behind the
    # Cloudflare → Traefik proxy chain (TLS terminated upstream).
    system:
      url: "https://sentry.nwlnexus.net"
    # Django settings appended verbatim to sentry.conf.py.
    #
    # NOTE: a previous attempt set these as sentry.web.env vars. That does NOT
    # work — Sentry's settings file does not read CSRF_TRUSTED_ORIGINS /
    # SECURE_PROXY_SSL_HEADER from the environment, so the CSRF check kept
    # failing ("Origin checking failed — https://sentry.nwlnexus.net does not
    # match any trusted origins"). They must be real Python settings, which is
    # what config.sentryConfPy injects.
    config:
      sentryConfPy: |
        CSRF_TRUSTED_ORIGINS = ["https://sentry.nwlnexus.net"]
        SECURE_PROXY_SSL_HEADER = ("HTTP_X_FORWARDED_PROTO", "https")
        USE_X_FORWARDED_HOST = True

        # Non-browser clients (Sentry SDKs, OTel collector) POST to /api/<id>/envelope/
        # without Origin/Referer/CSRF-token. Django CSRF rejects them, but these
        # endpoints have their own auth (X-Sentry-Auth / Bearer / DSN public key).
        # Monkey-patch CsrfViewMiddleware to skip /api/* — the safest place to inject
        # since sentryConfPy can't reorder Sentry's MIDDLEWARE tuple cleanly.
        from django.middleware.csrf import CsrfViewMiddleware as _CsrfMW
        _orig_csrf_process_view = _CsrfMW.process_view
        def _csrf_skip_api(self, request, callback, cb_args, cb_kwargs):
            if request.path.startswith("/api/"):
                return None
            return _orig_csrf_process_view(self, request, callback, cb_args, cb_kwargs)
        _CsrfMW.process_view = _csrf_skip_api
