apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentry
  namespace: sentry
spec:
  interval: 1h
  chart:
    spec:
      chart: sentry
      version: "31.7.0"
      sourceRef:
        kind: HelmRepository
        name: sentry
        namespace: sentry
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: sentry-secrets
      valuesKey: system-secret-key
      targetPath: sentry.systemSecretKey
    - kind: Secret
      name: sentry-secrets
      valuesKey: postgres-password
      targetPath: externalPostgresql.password
    - kind: Secret
      name: sentry-secrets
      valuesKey: clickhouse-password
      targetPath: externalClickhouse.password
    - kind: Secret
      name: sentry-secrets
      valuesKey: smtp-password
      targetPath: mail.password
    - kind: Secret
      name: sentry-secrets
      valuesKey: admin-username
      targetPath: user.email
    - kind: Secret
      name: sentry-secrets
      valuesKey: admin-password
      targetPath: user.password
  values:
    postgresql:
      enabled: false
    redis:
      enabled: false
    kafka:
      enabled: false
    clickhouse:
      enabled: false
    externalPostgresql:
      host: postgresql.platform.svc.cluster.local
      port: 5432
      username: postgres
      database: sentry
    externalRedis:
      host: redis-master.platform.svc.cluster.local
      port: 6379
      existingSecret: sentry-secrets
      existingSecretKey: redis-password
    externalKafka:
      host: kafka.platform.svc.cluster.local
      port: 9092
    externalClickhouse:
      host: clickhouse.platform.svc.cluster.local
      httpPort: 8123
      tcpPort: 9000
      username: default
      clusterName: sentry-clickhouse
    nginx:
      enabled: false
    mail:
      host: smtp.resend.com
      port: 587
      username: resend
      useTls: true
      from: sentry@nwlnexus.io
    user:
      create: true
      superuser: true
      # email and password injected via valuesFrom (user.email, user.password)
    sentry:
      web:
        env:
          - name: SENTRY_URL_PREFIX
            value: https://sentry.nwlnexus.net
          - name: CSRF_TRUSTED_ORIGINS
            value: "https://sentry.nwlnexus.net"
          - name: SECURE_PROXY_SSL_HEADER
            value: "HTTP_X_FORWARDED_PROTO,https"
