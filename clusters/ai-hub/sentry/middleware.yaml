apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sentry-entrypoints-nocache
  namespace: sentry
spec:
  # Sentry serves its SPA entrypoints (app.js, sentry.css) from a STABLE,
  # non-content-hashed path: /_static/dist/sentry/entrypoints/. Their contents
  # change on every Sentry upgrade, but the URL does not — so Cloudflare's
  # default "cache by extension" behavior keeps serving a previous deploy's
  # app.js, which references chunk hashes that no longer exist in the new image
  # (ChunkLoadError / "Awaiting solution to the halting problem"). Forcing the
  # entrypoints uncacheable makes Cloudflare always fetch the current ones.
  # The content-hashed chunks (/_static/dist/sentry/chunks/<id>.<hash>.js) are
  # immutable and remain cacheable via the default route.
  headers:
    customResponseHeaders:
      Cache-Control: "no-store, must-revalidate"
