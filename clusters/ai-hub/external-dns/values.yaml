provider:
  name: cloudflare
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token
domainFilters:
  - nwlnexus.net
policy: sync
sources:
  - service
  - ingress
  - traefik-proxy
txtOwnerId: ai-hub

# k3s/OrbStack uses traefik.io/v1alpha1 (Traefik v3); disable legacy containo.us API
extraArgs:
  - --traefik-disable-legacy
