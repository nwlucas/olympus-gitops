apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/ai-hub/platform
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets
    - name: cert-manager
    - name: qnap-storage
  # NOT depending on traefik-config / traefik-config-ingress: both are suspended
  # for the staged OTLP rollout and would permanently block platform. Platform
  # services bring their own IngressRoutes; Traefik routing works regardless of
  # whether traefik-config (HelmChartConfig tuning) has reconciled.
