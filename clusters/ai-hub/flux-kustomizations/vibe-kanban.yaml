apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vibe-kanban
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/ai-hub/vibe-kanban
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager
    - name: external-secrets
