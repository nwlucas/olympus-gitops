apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sentry
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/ai-hub/sentry
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: platform
    - name: cert-manager
  # NOT depending on traefik-config: that kustomization is suspended for the
  # staged OTLP rollout, which would permanently block this one. Sentry's
  # IngressRoute ships with the sentry HelmRelease itself; Traefik runtime
  # routing doesn't require traefik-config to be Ready.
