apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-config-ingress
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/ai-hub/traefik-config-ingress
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: traefik-config
    - name: cert-manager-config
