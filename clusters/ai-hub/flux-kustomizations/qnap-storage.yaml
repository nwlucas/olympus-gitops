apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qnap-storage
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/ai-hub/qnap-storage
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets
    - name: external-secrets-config
