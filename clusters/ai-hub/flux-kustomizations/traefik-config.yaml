apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-config
  namespace: flux-system
spec:
  # Staged rollout: suspended until management-hub OTLP validates.
  # Resume via follow-up PR removing this flag.
  suspend: true
  interval: 10m
  path: ./clusters/ai-hub/traefik-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager
    - name: cert-manager-config
