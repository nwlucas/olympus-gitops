apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-hub
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: external-secrets
            namespace: external-secrets
            wave: "0"
          - app: cert-manager
            namespace: cert-manager
            wave: "1"
          - app: traefik
            namespace: traefik
            wave: "2"
          - app: external-dns
            namespace: external-dns
            wave: "3"
          - app: cloudflared
            namespace: cloudflared
            wave: "3"
          - app: vibe-kanban
            namespace: vibe-kanban
            wave: "4"
  template:
    metadata:
      name: 'ai-hub-{{app}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/nwlucas/olympus-gitops
        targetRevision: main
        path: 'clusters/ai-hub/{{app}}'
      destination:
        server: https://100.95.232.41:6443
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
