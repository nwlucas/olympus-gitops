ingress:
  enabled: false

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      external-dns.alpha.kubernetes.io/target: ing.ai.nwlnexus.net
    hosts:
      - host: vibe.nwlnexus.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: vibe-tls
        hosts:
          - vibe.nwlnexus.net

postgresql:
  auth:
    existingSecret: vibe-kanban-secrets
    secretKeys:
      adminPasswordKey: db-password

relay:
  enabled: false

worker:
  enabled: false
