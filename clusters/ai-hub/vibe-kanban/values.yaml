# Vibe Kanban — values for ai-hub cluster
# Chart: oci://ghcr.io/everythings-gonna-be-alright/charts/vibe-kanban v0.0.3

# Use existing Secret managed by ESO (Option A)
secrets:
  existingSecret: vibe-kanban-secrets

# Disable the chart's built-in Ingress — we use a Traefik IngressRoute instead
ingress:
  enabled: false

relay:
  enabled: false
  ingress:
    enabled: false

worker:
  enabled: false
  ingress:
    enabled: false
