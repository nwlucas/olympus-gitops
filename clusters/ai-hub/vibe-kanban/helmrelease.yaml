apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vibe-kanban
  namespace: vibe-kanban
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: vibe-kanban
    namespace: vibe-kanban
  values:
    secrets:
      existingSecret: vibe-kanban-secrets
    ingress:
      enabled: false
    relay:
      enabled: false
      ingress:
        enabled: false
    worker:
      enabled: false
      ingress:
        enabled: false
