apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vibe-kanban
  namespace: vibe-kanban
spec:
  interval: 10m
  chart:
    spec:
      chart: vibe-kanban
      version: "0.0.4"
      sourceRef:
        kind: HelmRepository
        name: vibe-kanban
        namespace: vibe-kanban
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    secrets:
      existingSecret: vibe-kanban-secrets

    postgres:
      storage:
        storageClass: local-path

    electric:
      storage:
        storageClass: local-path

    server:
      env:
        RUST_LOG: "info"
        SERVER_LISTEN_ADDR: "0.0.0.0:8081"

    relay:
      enabled: true
      ingress:
        enabled: false

    worker:
      enabled: true
      image:
        tag: "worker-0.1.36"
      env:
        RUST_LOG: "info"
        VK_TUNNEL: "1"
        VK_ALLOWED_ORIGINS: "https://vibe.nwlnexus.net"
        VK_SHARED_API_BASE: ""
        VK_SHARED_RELAY_API_BASE: ""
      persistence:
        homeNode:
          storageClass: local-path
      ingress:
        enabled: false
      preStartScript:
        enabled: true
        script: |
          #!/bin/sh
          set -e

          # Olympus SDK project
          git clone https://x-access-token:${GITHUB_OLYMPUS_TOKEN}@github.com/nwlnexus/olympus-sdk /home/node/olympus-sdk
          git clone https://github.com/nwlucas/olympus-infra /home/node/olympus-infra
          git clone https://github.com/nwlucas/olympus-gitops /home/node/olympus-gitops

          # Work repos
          git clone https://x-access-token:${GITHUB_WORK_TOKEN}@github.com/dtlr/marquee /home/node/marquee
          git clone https://x-access-token:${GITHUB_WORK_TOKEN}@github.com/dtlr/formcenter /home/node/formcenter
          git clone https://x-access-token:${GITHUB_WORK_TOKEN}@github.com/dtlr/odysseus /home/node/odysseus
          git clone https://x-access-token:${GITHUB_WORK_TOKEN}@github.com/dtlr/itpulse /home/node/itpulse

    # ingress.host is used for SERVER_PUBLIC_BASE_URL even when ingress.enabled=false.
    # Traefik IngressRoute handles actual ingress instead.
    ingress:
      enabled: false
      host: vibe.nwlnexus.net

    networkPolicy:
      enabled: false

    podDisruptionBudget:
      enabled: false
