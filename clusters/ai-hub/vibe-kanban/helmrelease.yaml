apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vibe-kanban
  namespace: vibe-kanban
spec:
  interval: 10m
  chart:
    spec:
      chart: vibe-kanban
      version: "0.0.4"
      sourceRef:
        kind: HelmRepository
        name: vibe-kanban
        namespace: vibe-kanban
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    secrets:
      existingSecret: vibe-kanban-secrets

    postgres:
      storage:
        storageClass: local-path

    electric:
      storage:
        storageClass: local-path

    server:
      env:
        RUST_LOG: "info"
        SERVER_LISTEN_ADDR: "0.0.0.0:8081"

    relay:
      enabled: true
      ingress:
        enabled: false

    worker:
      enabled: true
      image:
        tag: "worker-0.1.36"
      env:
        RUST_LOG: "info"
        VK_TUNNEL: "1"
        VK_ALLOWED_ORIGINS: "https://vibe.nwlnexus.net"
        VK_SHARED_API_BASE: ""
        VK_SHARED_RELAY_API_BASE: ""
      persistence:
        homeNode:
          storageClass: local-path
      ingress:
        enabled: false
      preStartScript:
        enabled: true
        script: |
          #!/bin/sh
          set -e
          mkdir -p /home/node/.ssh
          chmod 700 /home/node/.ssh

          # SSH config: personal key for github.com, work key for github.com-work alias
          cat > /home/node/.ssh/config << 'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile /etc/ssh-keys/olympus-deploy-key
            StrictHostKeyChecking no

          Host github.com-work
            HostName github.com
            User git
            IdentityFile /etc/ssh-keys/work-deploy-key
            StrictHostKeyChecking no
          EOF
          chmod 600 /home/node/.ssh/config

          # Olympus SDK project (private via SSH, public via HTTPS)
          git clone git@github.com:nwlnexus/olympus-sdk /home/node/olympus-sdk
          git clone https://github.com/nwlucas/olympus-infra /home/node/olympus-infra
          git clone https://github.com/nwlucas/olympus-gitops /home/node/olympus-gitops

          # Work repos (shared work SSH key via github.com-work alias)
          git clone git@github.com-work:dtlr/marquee /home/node/marquee
          git clone git@github.com-work:dtlr/formcenter /home/node/formcenter
          git clone git@github.com-work:dtlr/odysseus /home/node/odysseus
          git clone git@github.com-work:dtlr/itpulse /home/node/itpulse
      extraVolumes:
        - name: ssh-keys
          secret:
            secretName: vibe-kanban-secrets
            defaultMode: 0600
            items:
              - key: github-olympus-deploy-key
                path: olympus-deploy-key
              - key: github-work-deploy-key
                path: work-deploy-key
      extraVolumeMounts:
        - name: ssh-keys
          mountPath: /etc/ssh-keys
          readOnly: true

    # ingress.host is used for SERVER_PUBLIC_BASE_URL even when ingress.enabled=false.
    # Traefik IngressRoute handles actual ingress instead.
    ingress:
      enabled: false
      host: vibe.nwlnexus.net

    networkPolicy:
      enabled: false

    podDisruptionBudget:
      enabled: false
