apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vibe-relay
  namespace: vibe-kanban
  annotations:
    external-dns.alpha.kubernetes.io/hostname: relay.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.ai.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`relay.nwlnexus.net`)
      kind: Rule
      services:
        - name: vibe-kanban-relay
          port: 8082
  tls:
    secretName: vibe-relay-tls
