apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vibe-kanban
  namespace: vibe-kanban
  annotations:
    external-dns.alpha.kubernetes.io/hostname: vibe.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.ai.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vibe.nwlnexus.net`)
      kind: Rule
      services:
        - name: vibe-kanban-server
          port: 3000
  tls:
    secretName: vibe-tls
