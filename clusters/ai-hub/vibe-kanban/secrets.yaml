apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vibe-kanban-secrets
  namespace: vibe-kanban
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: vibe-kanban-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Required: PostgreSQL application user password
    # 1Password: Vibe Kanban → db-password
    - secretKey: DB_PASSWORD
      remoteRef:
        key: Vibe Kanban
        property: db-password
    # Required: JWT signing secret
    # 1Password: Vibe Kanban → jwt-secret
    - secretKey: VIBEKANBAN_REMOTE_JWT_SECRET
      remoteRef:
        key: Vibe Kanban
        property: jwt-secret
    # Required: ElectricSQL replication role password
    # 1Password: Vibe Kanban → electric-role-password  (add this field if missing)
    - secretKey: ELECTRIC_ROLE_PASSWORD
      remoteRef:
        key: Vibe Kanban
        property: electric-role-password
