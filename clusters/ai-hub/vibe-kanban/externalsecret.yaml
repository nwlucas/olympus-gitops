apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vibe-kanban-secrets
  namespace: vibe-kanban
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: vibe-kanban-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: vibe-kanban
        property: db-password
    - secretKey: VIBEKANBAN_REMOTE_JWT_SECRET
      remoteRef:
        key: vibe-kanban
        property: jwt-secret
    - secretKey: ELECTRIC_ROLE_PASSWORD
      remoteRef:
        key: vibe-kanban
        property: electric-role-password
    - secretKey: GOOGLE_OAUTH_CLIENT_ID
      remoteRef:
        key: google-oauth-olympus
        property: client-id
    - secretKey: GOOGLE_OAUTH_CLIENT_SECRET
      remoteRef:
        key: google-oauth-olympus
        property: client-secret
    # Required: SSH deploy key for nwlnexus/olympus-sdk (private repo)
    # 1Password: Vibe Kanban → github-olympus-deploy-key
    - secretKey: github-olympus-deploy-key
      remoteRef:
        key: vibe-kanban
        property: github-olympus-deploy-key
    # Required: SSH deploy key for dtlr/* work repos (shared key, github.com-work alias)
    # 1Password: Vibe Kanban → github-work-deploy-key
    - secretKey: github-work-deploy-key
      remoteRef:
        key: vibe-kanban
        property: github-work-deploy-key
