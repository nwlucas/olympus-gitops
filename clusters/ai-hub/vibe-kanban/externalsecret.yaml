apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vibe-kanban-secrets
  namespace: vibe-kanban
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: vibe-kanban-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: vibe-kanban
        property: db-password
    - secretKey: VIBEKANBAN_REMOTE_JWT_SECRET
      remoteRef:
        key: vibe-kanban
        property: jwt-secret
    - secretKey: ELECTRIC_ROLE_PASSWORD
      remoteRef:
        key: vibe-kanban
        property: electric-role-password
    - secretKey: GOOGLE_OAUTH_CLIENT_ID
      remoteRef:
        key: google-oauth-olympus
        property: client-id
    - secretKey: GOOGLE_OAUTH_CLIENT_SECRET
      remoteRef:
        key: google-oauth-olympus
        property: client-secret
    # GitHub PAT for nwlnexus/olympus-sdk (Contents RW, PRs RW, Workflows RW)
    # 1Password: Vibe Kanban → github-olympus-token
    - secretKey: GITHUB_OLYMPUS_TOKEN
      remoteRef:
        key: vibe-kanban
        property: github-olympus-token
    # GitHub PAT for dtlr/* work repos (Contents RW, PRs RW, Workflows RW)
    # 1Password: Vibe Kanban → github-work-token
    - secretKey: GITHUB_WORK_TOKEN
      remoteRef:
        key: vibe-kanban
        property: github-work-token
