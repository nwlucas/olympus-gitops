---
# Routes OrbStack k8s traffic to the Docker Compose deployment on the macOS host.
# The remote-server container publishes port 8081 on all interfaces (0.0.0.0).
# OrbStack k8s pods reach the macOS host via its Tailscale IP (100.95.232.41).
# Tailscale on macOS handles the loopback routing back to Docker's published port.
apiVersion: v1
kind: Service
metadata:
  name: vibe-kanban-server
  namespace: vibe-kanban
spec:
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: vibe-kanban-server
  namespace: vibe-kanban
subsets:
  - addresses:
      - ip: 100.95.232.41  # ai-hub Tailscale IP
    ports:
      - name: http
        port: 8081
        protocol: TCP
