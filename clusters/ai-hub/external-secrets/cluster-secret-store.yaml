apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: onepassword-connect
spec:
  provider:
    onepassword:
      connectHost: https://connect.nwlnexus.net
      vaults:
        Dev: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: eso-op-connect-token
            namespace: external-secrets
            key: token
