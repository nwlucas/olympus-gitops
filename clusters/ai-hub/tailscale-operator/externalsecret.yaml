apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: operator-oauth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        clientId: "{{ .clientId }}"
        clientSecret: "{{ .clientSecret }}"
  data:
    - secretKey: clientId
      remoteRef:
        key: ansible-tailscale-oauth
        property: client-id
    - secretKey: clientSecret
      remoteRef:
        key: ansible-tailscale-oauth
        property: client-secret
