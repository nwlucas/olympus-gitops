apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: operator-oauth
      valuesKey: clientId
      targetPath: oauth.clientId
    - kind: Secret
      name: operator-oauth
      valuesKey: clientSecret
      targetPath: oauth.clientSecret
  values:
    operatorConfig:
      hostname: ai-hub-operator
    # Expose the k3s API server over the tailnet via the operator's in-process
    # API server proxy (reachable at https://ai-hub-operator.<tailnet>.ts.net).
    # This is the access path for ai-hub because its k3s API lives inside the
    # Colima VM and cannot be published on the Mac host's tailnet IP like the
    # bare-metal nodes are. "noauth" forwards requests as the operator's
    # ServiceAccount; access is gated by tailnet ACL reachability to the
    # ai-hub-operator device (tighten alongside ACL hardening — olympus-sdk#56).
    apiServerProxyConfig:
      mode: "noauth"
