apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: "1.98.4"  # pinned: unpinned upgrades silently changed proxy behavior (VIPService) and churned agents
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: operator-oauth
      valuesKey: clientId
      targetPath: oauth.clientId
    - kind: Secret
      name: operator-oauth
      valuesKey: clientSecret
      targetPath: oauth.clientSecret
  values:
    operatorConfig:
      hostname: ai-hub-operator
    # Expose the k3s API server over the tailnet via the operator's in-process
    # API server proxy (https://ai-hub-operator.<tailnet>.ts.net). Required for
    # ai-hub because its k3s API lives inside the Colima VM and can't be
    # published on the Mac host's tailnet IP like the bare-metal nodes are.
    #
    # AUTH mode (mode: "true"): the proxy authenticates the caller's Tailscale
    # identity and impersonates k8s groups/users per tailnet ACL grants, so
    # real RBAC applies (no "reachability == cluster-admin"). allowImpersonation
    # creates the ClusterRole the proxy needs to impersonate. Requires a tailnet
    # ACL grant (app: tailscale.com/cap/kubernetes) mapping identities to k8s
    # groups, and HTTPS Certificates enabled on the tailnet (done).
    apiServerProxyConfig:
      mode: "true"
      allowImpersonation: "true"
