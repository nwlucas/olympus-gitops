apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: operator-oauth
      valuesKey: clientId
      targetPath: oauth.clientId
    - kind: Secret
      name: operator-oauth
      valuesKey: clientSecret
      targetPath: oauth.clientSecret
  values:
    operatorConfig:
      hostname: ai-hub-operator
    # NOTE: the operator's API-server proxy (apiServerProxyConfig.mode) is
    # intentionally left disabled. Both "auth" and "noauth" modes serve the
    # k8s API over HTTPS on the operator's MagicDNS name and require a
    # Tailscale-issued TLS cert (tailnet HTTPS Certificates), which we are
    # avoiding. ai-hub's API is instead reached over the tailnet via a TCP
    # passthrough proxy using k3s's own client-cert auth + RBAC.
