apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: litellm
  namespace: litellm
  annotations:
    external-dns.alpha.kubernetes.io/hostname: litellm.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.ai.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`litellm.nwlnexus.net`)
      kind: Rule
      services:
        - name: litellm
          port: 4000
  tls:
    secretName: litellm-tls
