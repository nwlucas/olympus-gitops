apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # Local models via Ollama on the ai-hub host (host.internal:11434)
      - model_name: local-fast
        litellm_params:
          model: ollama/glm-4.7-flash:latest
          api_base: http://host.internal:11434

      - model_name: local-heavy
        litellm_params:
          model: ollama/llama3.3:70b
          api_base: http://host.internal:11434

      # Anthropic models (credentials injected via env)
      - model_name: sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: opus
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_key: os.environ/ANTHROPIC_API_KEY

    litellm_settings:
      drop_params: true

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
