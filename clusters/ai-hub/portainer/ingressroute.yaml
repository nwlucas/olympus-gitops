apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portainer
  namespace: portainer
  annotations:
    external-dns.alpha.kubernetes.io/hostname: dock.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.ai-hub.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dock.nwlnexus.net`)
      kind: Rule
      services:
        - name: portainer
          port: 9000
  tls:
    secretName: portainer-tls
