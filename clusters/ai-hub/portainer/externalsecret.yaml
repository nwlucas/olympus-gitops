apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: portainer-admin
  namespace: portainer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: portainer-admin
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: olympus-portainer
        property: username
    - secretKey: password
      remoteRef:
        key: olympus-portainer
        property: password
---
# Shared agent secret: the Portainer SERVER must present the same AGENT_SECRET
# that the standard agents (management-hub, compute-hub) require, or agent
# connections are rejected (403) and those environments show Down. Sourced from
# the same 1Password property the agents use (ai-hub-secrets/portainer-agent-secret).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: portainer-agent-secret
  namespace: portainer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: portainer-agent-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AGENT_SECRET
      remoteRef:
        key: ai-hub-secrets
        property: portainer-agent-secret
