# Tailscale egress proxies so the Portainer server (running as a pod in
# ai-hub) can reach the Portainer Agents on the other clusters over the
# tailnet. The operator creates a proxy pod per Service; pods connect to
# <name>.portainer.svc.cluster.local:9001 which is routed to the tailnet
# device named in tailscale.com/tailnet-fqdn.
---
apiVersion: v1
kind: Service
metadata:
  name: management-hub-agent
  namespace: portainer
  annotations:
    tailscale.com/tailnet-fqdn: management-hub-agent.raptor-mimosa.ts.net
    tailscale.com/tags: tag:portainer-server
spec:
  type: ExternalName
  externalName: placeholder.invalid
  ports:
    - name: agent
      port: 9001
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: compute-hub-agent
  namespace: portainer
  annotations:
    tailscale.com/tailnet-fqdn: compute-hub-agent.raptor-mimosa.ts.net
    tailscale.com/tags: tag:portainer-server
spec:
  type: ExternalName
  externalName: placeholder.invalid
  ports:
    - name: agent
      port: 9001
      protocol: TCP
