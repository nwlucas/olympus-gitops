apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 1h
  install:
    timeout: 15m
    remediation:
      retries: 3
  chart:
    spec:
      chart: portainer
      version: "239.2.0"
      sourceRef:
        kind: HelmRepository
        name: portainer
        namespace: portainer
  values:
    service:
      type: ClusterIP
    ingress:
      enabled: false
    persistence:
      existingClaim: portainer-data
    adminPassword:
      existingSecret: portainer-admin
