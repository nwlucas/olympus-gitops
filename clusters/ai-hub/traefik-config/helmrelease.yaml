apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: ">=30.0.0 <31.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  install:
    remediation:
      retries: 3
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
    providers:
      kubernetesCRD:
        allowExternalNameServices: true
      kubernetesIngress:
        enabled: true
    ports:
      web:
        redirectTo:
          port: websecure
      websecure:
        tls:
          enabled: true
      portainer-edge:
        port: 8000
        expose:
          default: true
        protocol: TCP
    api:
      dashboard: true
    logs:
      general:
        level: INFO
    tracing:
      otlp:
        enabled: true
        grpc:
          enabled: true
          endpoint: opentelemetry-collector.otel.svc.cluster.local:4317
          insecure: true
    service:
      type: LoadBalancer
