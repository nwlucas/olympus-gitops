apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clickhouse
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/management-hub/clickhouse
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: qnap-csi-config
    - name: external-secrets
