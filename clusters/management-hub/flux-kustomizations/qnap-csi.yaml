apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qnap-csi
  namespace: flux-system
spec:
  # Suspended until management-hub-qnap-iscsi is populated in 1Password.
  # Resume with: flux resume kustomization qnap-csi --context management-hub
  suspend: true
  interval: 10m
  path: ./clusters/management-hub/qnap-csi
  prune: true
  wait: true
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets
