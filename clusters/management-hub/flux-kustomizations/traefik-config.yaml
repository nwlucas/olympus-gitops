apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/management-hub/traefik-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager
  # Note: NOT depending on otel-collector — Traefik handles unreachable OTLP
  # tracing endpoints gracefully (retries silently with insecure: true) and the
  # collector's kustomization being suspended (staged rollout) would deadlock
  # this chain forever otherwise.
