apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubeconfig-merger
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/management-hub/kubeconfig-merger
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets  # needs ESO ClusterSecretStore + eso-op-connect-token
    - name: headlamp          # headlamp namespace must exist before we create the Role there
