apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vibe-worker
  namespace: vibe-kanban
  annotations:
    kubernetes.io/ingress.class: traefik
    external-dns.alpha.kubernetes.io/hostname: vk-host.nwlnexus.xyz
    external-dns.alpha.kubernetes.io/target: ing.mgmt.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vk-host.nwlnexus.xyz`)
      kind: Rule
      services:
        - name: vibe-kanban-worker
          port: 8083
  tls:
    secretName: vibe-worker-tls
