apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vibe-kanban
  namespace: vibe-kanban
  annotations:
    kubernetes.io/ingress.class: traefik
    external-dns.alpha.kubernetes.io/hostname: vibe.nwlnexus.xyz
    external-dns.alpha.kubernetes.io/target: ing.mgmt.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vibe.nwlnexus.xyz`)
      kind: Rule
      services:
        - name: vibe-kanban-server
          port: 8081
  tls:
    secretName: vibe-tls
