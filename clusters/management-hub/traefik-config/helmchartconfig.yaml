apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ingressClass:
      name: traefik
      isDefaultClass: false
    providers:
      kubernetesCRD:
        ingressClass: traefik
      kubernetesIngress:
        ingressClass: traefik
    ports:
      web:
        redirectTo:
          port: websecure
      websecure:
        tls:
          enabled: true
    api:
      dashboard: true
    logs:
      general:
        level: INFO
