---
apiVersion: v1
kind: Namespace
metadata:
  name: portainer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portainer-sa-clusteradmin
  namespace: portainer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portainer-crb-clusteradmin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: portainer-sa-clusteradmin
    namespace: portainer
---
# Secret must be created out-of-band (not committed to git):
# kubectl create secret generic portainer-edge-key -n portainer \
#   --from-literal=edge-key=<EDGE_KEY>
#
# EDGE_KEY for management-hub (Env ID 4) using Tailnet tunnel 100.111.175.126:8000:
# aHR0cHM6Ly9kb2NrLm53bG5leHVzLm5ldHwxMDAuMTExLjE3NS4xMjY6ODAwMHxDeEhSZHVlT1JERmt3YnpBWElicjNBSytYTE1kTW56Rllabm1wdDdCN1JrPXw0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer-agent
  namespace: portainer
spec:
  selector:
    matchLabels:
      app: portainer-agent
  template:
    metadata:
      labels:
        app: portainer-agent
    spec:
      serviceAccountName: portainer-sa-clusteradmin
      containers:
        - name: portainer-agent
          image: portainer/agent:2.19.4
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: KUBERNETES_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: EDGE
              value: "1"
            - name: EDGE_ID
              value: "4"
            - name: EDGE_KEY
              valueFrom:
                secretKeyRef:
                  name: portainer-edge-key
                  key: edge-key
            - name: EDGE_INSECURE_POLL
              value: "1"
            - name: AGENT_CLUSTER_ADDR
              value: portainer-agent.portainer.svc.cluster.local
          ports:
            - containerPort: 9001
              protocol: TCP
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: portainer-agent
  namespace: portainer
spec:
  clusterIP: None
  selector:
    app: portainer-agent
  ports:
    - port: 9001
      targetPort: 9001
      protocol: TCP
