apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-provisioner
  namespace: nfs-provisioner
spec:
  interval: 1h
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "4.0.18"
      sourceRef:
        kind: HelmRepository
        name: nfs-provisioner
        namespace: nfs-provisioner
  values:
    nfs:
      server: qnap.nwlnexus.net
      path: /compute-hub
    storageClass:
      name: qnap-nfs
      reclaimPolicy: Retain
      defaultClass: false
      archiveOnDelete: false
