apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: otel
spec:
  interval: 1h
  chart:
    spec:
      chart: opentelemetry-collector
      version: ">=0.110.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: otel
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    mode: deployment
    replicaCount: 1
    fullnameOverride: opentelemetry-collector
    # contrib distribution includes the sentry exporter
    image:
      repository: otel/opentelemetry-collector-contrib
    extraEnvsFrom:
      - secretRef:
          name: sentry-otlp
    ports:
      otlp:
        enabled: true
        containerPort: 4317
        servicePort: 4317
        protocol: TCP
      otlp-http:
        enabled: true
        containerPort: 4318
        servicePort: 4318
        protocol: TCP
      metrics:
        enabled: false
      jaeger-compact:
        enabled: false
      jaeger-thrift:
        enabled: false
      jaeger-grpc:
        enabled: false
      zipkin:
        enabled: false
    service:
      type: ClusterIP
    presets:
      logsCollection:
        enabled: false
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        # disable defaults we don't want
        jaeger: null
        prometheus: null
        zipkin: null
      processors:
        memory_limiter:
          check_interval: 1s
          limit_percentage: 80
          spike_limit_percentage: 25
        batch:
          timeout: 5s
          send_batch_size: 512
        resource:
          attributes:
            - key: cluster
              value: management-hub
              action: upsert
            - key: deployment.environment
              value: homelab
              action: upsert
      exporters:
        sentry:
          dsn: ${env:SENTRY_DSN}
          environment: homelab
      service:
        telemetry:
          metrics:
            level: none
        pipelines:
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, batch]
            exporters: [sentry]
          metrics: null
          logs: null
