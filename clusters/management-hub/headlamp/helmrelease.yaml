apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  timeout: 5m
  chart:
    spec:
      chart: headlamp
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    config:
      inCluster: true
      inClusterContextName: "management-hub"
    service:
      type: ClusterIP
