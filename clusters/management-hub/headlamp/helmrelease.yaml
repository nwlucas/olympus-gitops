apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  timeout: 5m
  chart:
    spec:
      chart: headlamp
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    config:
      inCluster: false
      extraArgs:
        - --kubeconfig=/headlamp/kubeconfigs/combined/kubeconfig
    volumes:
      - name: combined-kubeconfig
        secret:
          secretName: ai-hub-kubeconfig
    volumeMounts:
      - name: combined-kubeconfig
        mountPath: /headlamp/kubeconfigs/combined
        readOnly: true
    service:
      type: ClusterIP
