apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: operator-oauth
      valuesKey: clientId
      targetPath: oauth.clientId
    - kind: Secret
      name: operator-oauth
      valuesKey: clientSecret
      targetPath: oauth.clientSecret
  values:
    operatorConfig:
      hostname: management-hub-operator
    # Identity-enforced kubectl/k9s access over the tailnet. The operator's
    # API server proxy (https://management-hub-operator.<tailnet>.ts.net)
    # authenticates the caller's Tailscale identity and impersonates k8s groups
    # per the tailnet ACL grant (app: tailscale.com/cap/kubernetes, dst
    # tag:k8s-operator). Replaces shared admin client-cert kubeconfigs.
    apiServerProxyConfig:
      mode: "true"
      allowImpersonation: "true"
