apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    oauth:
      clientId: ""
      clientSecret: ""
    operatorConfig:
      hostname: management-hub-operator
