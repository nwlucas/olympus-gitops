apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeconfig-merger
  namespace: external-secrets
data:
  # One 1Password document name per line. Changes here hot-reload the app
  # (no pod restart needed — fsnotify detects the ConfigMap volume swap).
  kubeconfig-items: |
    management-hub-kubeconfig
    compute-hub-kubeconfig
  # Name of the merged document written back to 1Password
  combined-item-name: headlamp-combined-kubeconfig
  # Which cluster is the default context in Headlamp (must match a context name
  # in one of the individual kubeconfigs above)
  current-context: management-hub
  vault: Dev
  # How often to poll 1Password item metadata (updated_at) to detect changes.
  # One cheap GET /items call per interval — no file content fetched unless a
  # timestamp changes. Replaces the Events API (which requires Business tier).
  watch-interval: 5m
  # Full hash-compare + k8s Secret sync fallback interval
  sync-interval: 4h
  # abort sync if any item is missing (false = continue with available configs)
  allow-partial: "false"
