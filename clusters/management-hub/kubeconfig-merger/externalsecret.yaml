---
# Pulls the 1Password Events Reporting token into a Secret the merger can mount.
# Create the 1Password item first:
#   Vault: Dev  |  Item name: olympus-events-api-token  |  Field: token
# If this item doesn't exist yet, ESO will set the Secret to a blank value and
# the merger will start in timer-only mode (OP_EVENTS_TOKEN will be empty).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kubeconfig-merger-events-token
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: kubeconfig-merger-events-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: olympus-events-api-token
        property: token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
