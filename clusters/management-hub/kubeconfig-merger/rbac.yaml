---
# ServiceAccount for the merger, in the same namespace as the Connect token
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeconfig-merger
  namespace: external-secrets
---
# Role + RoleBinding granting the merger read access to its own ConfigMap
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeconfig-merger
  namespace: external-secrets
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kubeconfig-merger"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeconfig-merger
  namespace: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeconfig-merger
subjects:
  - kind: ServiceAccount
    name: kubeconfig-merger
    namespace: external-secrets
---
# Role + RoleBinding granting the merger write access to the combined-kubeconfig
# Secret in its own namespace (headlamp namespace was removed when Headlamp was
# retired; the k8s Secret copy now lives alongside the merger).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeconfig-merger-writer
  namespace: external-secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["combined-kubeconfig"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeconfig-merger-writer
  namespace: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeconfig-merger-writer
subjects:
  - kind: ServiceAccount
    name: kubeconfig-merger
    namespace: external-secrets
