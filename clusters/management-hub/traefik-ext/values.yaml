ingressClass:
  name: traefik-ext
  isDefaultClass: false

providers:
  kubernetesCRD:
    ingressClass: traefik-ext
  kubernetesIngress:
    ingressClass: traefik-ext

service:
  type: ClusterIP

ports:
  web:
    port: 80
    expose:
      default: true
  websecure:
    port: 443
    expose:
      default: true
    http:
      tls:
        enabled: true

api:
  dashboard: false

logs:
  general:
    level: INFO
