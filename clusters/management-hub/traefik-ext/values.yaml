ingressClass:
  name: traefik-ext
  isDefaultClass: false

providers:
  kubernetesCRD:
    ingressClass: traefik-ext
  kubernetesIngress:
    ingressClass: traefik-ext

service:
  type: ClusterIP

ports:
  web:
    port: 80
    expose:
      default: true
  websecure:
    port: 443
    expose:
      default: true
    http:
      tls:
        enabled: true

api:
  dashboard: true
  insecure: true  # serve dashboard on traefik entrypoint so main Traefik can proxy to it

ports:
  traefik:
    port: 9000
    expose:
      default: true  # expose ClusterIP port so main k3s Traefik can route to it

logs:
  general:
    level: INFO
