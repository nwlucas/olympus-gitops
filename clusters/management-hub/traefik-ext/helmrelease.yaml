apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-ext
  namespace: traefik-ext
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik-ext
  values:
    ingressClass:
      name: traefik-ext
      isDefaultClass: false

    providers:
      kubernetesCRD:
        ingressClass: traefik-ext
      kubernetesIngress:
        ingressClass: traefik-ext

    service:
      type: ClusterIP

    ports:
      web:
        port: 80
        expose:
          default: true
      websecure:
        port: 443
        expose:
          default: true
        http:
          tls:
            enabled: true
      traefik:
        port: 9000
        expose:
          default: true  # expose ClusterIP port so main k3s Traefik can route to it

    api:
      dashboard: true
      insecure: true  # serve dashboard on traefik entrypoint so main Traefik can proxy to it

    logs:
      general:
        level: INFO
