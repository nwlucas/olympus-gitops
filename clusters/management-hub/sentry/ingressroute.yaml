apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sentry
  namespace: sentry
  annotations:
    kubernetes.io/ingress.class: traefik
    external-dns.alpha.kubernetes.io/hostname: sentry.nwlnexus.net
    external-dns.alpha.kubernetes.io/target: ing.mgmt.nwlnexus.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sentry.nwlnexus.net`)
      kind: Rule
      services:
        - name: sentry-web
          port: 9000
  tls:
    secretName: sentry-tls
