apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
  namespace: kafka
spec:
  interval: 1h
  chart:
    spec:
      chart: kafka
      version: "31.5.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: kafka
  values:
    image:
      registry: registry-1.docker.io
      tag: latest
    kraft:
      enabled: true
    zookeeper:
      enabled: false
    listeners:
      client:
        protocol: PLAINTEXT
      controller:
        protocol: PLAINTEXT
      interbroker:
        protocol: PLAINTEXT
    controller:
      replicaCount: 1
      persistence:
        enabled: true
        storageClass: qnap-nfs
        size: 20Gi
    broker:
      replicaCount: 0
