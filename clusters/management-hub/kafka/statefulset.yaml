apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      initContainers:
        - name: kafka-init
          image: apache/kafka:3.9.2
          command:
            - /bin/sh
            - -c
            - |
              if [ ! -f /var/lib/kafka/data/.cluster-formatted ]; then
                /opt/kafka/bin/kafka-storage.sh format \
                  --cluster-id "MkU3OEVBNTcwNTJENDM2Qk" \
                  --config /opt/kafka/config/kraft/server.properties \
                  --ignore-formatted
                touch /var/lib/kafka/data/.cluster-formatted
              fi
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: config
              mountPath: /opt/kafka/config/kraft/server.properties
              subPath: server.properties
      containers:
        - name: kafka
          image: apache/kafka:3.9.2
          command:
            - /opt/kafka/bin/kafka-server-start.sh
            - /opt/kafka/config/kraft/server.properties
          ports:
            - name: client
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx1g -Xms512m"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: config
              mountPath: /opt/kafka/config/kraft/server.properties
              subPath: server.properties
      volumes:
        - name: config
          configMap:
            name: kafka-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: qnap-nfs
        resources:
          requests:
            storage: 20Gi
