apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse
  namespace: clickhouse
spec:
  interval: 1h
  chart:
    spec:
      chart: clickhouse
      version: "7.2.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: clickhouse
  valuesFrom:
    - kind: Secret
      name: clickhouse-creds
      valuesKey: clickhouse-password
      targetPath: auth.password
  values:
    image:
      registry: registry-1.docker.io
      tag: latest
    auth:
      username: default
    clusterName: sentry-clickhouse
    shards: 1
    replicaCount: 1
    zookeeper:
      enabled: false
    extraEnvVars:
      - name: TZ
        value: UTC
    persistence:
      enabled: true
      storageClass: qnap-nfs
      size: 50Gi
    logPersistence:
      enabled: true
      storageClass: qnap-nfs
      size: 20Gi
