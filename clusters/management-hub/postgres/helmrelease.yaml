apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: postgres
spec:
  interval: 1h
  chart:
    spec:
      chart: postgresql
      version: "18.6.9"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: postgres
  valuesFrom:
    - kind: Secret
      name: postgres-creds
      valuesKey: postgres-password
      targetPath: auth.password
  values:
    auth:
      username: sentry
      database: sentry
    primary:
      persistence:
        enabled: true
        storageClass: qnap-nfs
        size: 50Gi
    readReplicas:
      replicaCount: 0
