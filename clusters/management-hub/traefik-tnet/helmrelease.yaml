apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-tnet
  namespace: traefik-tnet
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik-tnet
  values:
    ingressClass:
      name: traefik-tnet
      isDefaultClass: false

    providers:
      kubernetesCRD:
        ingressClass: traefik-tnet
      kubernetesIngress:
        ingressClass: traefik-tnet

    service:
      type: NodePort

    ports:
      web:
        # HTTP accessible at traefik-tnet.traefik-tnet:8000 (chart default container port)
        expose:
          default: true
      websecure:
        expose:
          default: true
        http:
          tls:
            enabled: true
      traefik:
        expose:
          default: true  # expose dashboard port (8080) so main k3s Traefik can proxy to it

    api:
      dashboard: true
      insecure: true  # serve dashboard on traefik entrypoint so main Traefik can proxy to it

    logs:
      general:
        level: INFO
