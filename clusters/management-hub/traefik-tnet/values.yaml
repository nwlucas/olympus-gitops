ingressClass:
  name: traefik-tnet
  isDefaultClass: false

providers:
  kubernetesCRD:
    ingressClass: traefik-tnet
  kubernetesIngress:
    ingressClass: traefik-tnet

service:
  type: NodePort

ports:
  web:
    port: 80
    # Enable HTTP so cloudflared can route to traefik-tnet via http://traefik-tnet.traefik-tnet:80
    expose:
      default: true
  websecure:
    port: 443
    nodePort: 31443
    expose:
      default: true
    http:
      tls:
        enabled: true

api:
  dashboard: true
  insecure: true  # serve dashboard on traefik entrypoint so main Traefik can proxy to it

ports:
  traefik:
    port: 9000
    expose:
      default: true  # expose ClusterIP port so main k3s Traefik can route to it

logs:
  general:
    level: INFO
