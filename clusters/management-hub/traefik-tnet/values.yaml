ingressClass:
  name: traefik-tnet
  isDefaultClass: false

providers:
  kubernetesCRD:
    ingressClass: traefik-tnet
  kubernetesIngress:
    ingressClass: traefik-tnet

service:
  type: NodePort

ports:
  web:
    port: 80
    expose:
      default: false
  websecure:
    port: 443
    nodePort: 9443
    expose:
      default: true
    http:
      tls:
        enabled: true

api:
  dashboard: false

logs:
  general:
    level: INFO
