provider:
  name: cloudflare
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token
domainFilters:
  - nwlnexus.net
policy: sync
sources:
  - service
  - ingress
  - crd
  - traefik-proxy
txtOwnerId: management-hub
txtPrefix: "mgmt-"
logLevel: info
logFormat: json
extraArgs:
  - --traefik-disable-legacy
  - --cloudflare-proxied
