apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-credentials
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: cloudflare-credentials
  data:
    - secretKey: api-key
      remoteRef:
        key: cloudflare-account
        property: global_key
    - secretKey: api-email
      remoteRef:
        key: cloudflare-account
        property: email
