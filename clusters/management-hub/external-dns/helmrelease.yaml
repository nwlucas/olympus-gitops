apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.15.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
  values:
    provider:
      name: cloudflare
    env:
      - name: CF_API_KEY
        valueFrom:
          secretKeyRef:
            name: cloudflare-credentials
            key: api-key
      - name: CF_API_EMAIL
        valueFrom:
          secretKeyRef:
            name: cloudflare-credentials
            key: api-email
    domainFilters:
      - nwlnexus.net
      - nwlnexus.xyz
    policy: sync
    sources:
      - service
      - ingress
      - traefik-proxy
    txtOwnerId: management-hub
    txtPrefix: "mgmt-"
    logLevel: info
    logFormat: json
    extraArgs:
      - --traefik-disable-legacy
      - --cloudflare-proxied
