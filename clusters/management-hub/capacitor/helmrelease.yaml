apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capacitor-next
  namespace: flux-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: capacitor-next
    namespace: flux-system
  values:
    env:
      AUTH: static
    existingSecret:
      name: capacitor-next
    service:
      type: ClusterIP
      port: 80
      targetPort: 8080
