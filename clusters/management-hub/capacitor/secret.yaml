# 1Password item: capacitor-next (Dev vault)
# Required fields:
#   session-hash-key:     base64:<openssl rand -base64 32>
#   session-block-key:    base64:<openssl rand -base64 32>
#   users:                email:bcrypt-hash  e.g. you@example.com:$(htpasswd -nbBC 10 "" pw | tr -d ':\n')
#   impersonate-sa-rules: email=flux-system:capacitor-next-preset-clusteradmin
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: capacitor-next
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: capacitor-next
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: SESSION_HASH_KEY
      remoteRef:
        key: capacitor-next
        property: session-hash-key
    - secretKey: SESSION_BLOCK_KEY
      remoteRef:
        key: capacitor-next
        property: session-block-key
    - secretKey: USERS
      remoteRef:
        key: capacitor-next
        property: users
    - secretKey: IMPERSONATE_SA_RULES
      remoteRef:
        key: capacitor-next
        property: impersonate-sa-rules
