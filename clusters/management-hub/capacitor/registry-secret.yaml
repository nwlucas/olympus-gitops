# Capacitor cluster registry configuration.
# Not sensitive — defines which clusters Capacitor connects to.
# ai-hub agent configuration will be added in a later step.
apiVersion: v1
kind: Secret
metadata:
  name: capacitor-next
  namespace: flux-system
type: Opaque
stringData:
  registry.yaml: |
    clusters:
    - id: in-cluster
      name: management-hub
      apiServerURL: https://kubernetes.default.svc
      certificateAuthorityFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      serviceAccount:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
