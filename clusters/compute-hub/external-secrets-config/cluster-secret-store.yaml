apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: onepassword-connect
spec:
  provider:
    onepassword:
      # Use the 1Password Connect server running on management-hub (routed via Tailscale)
      # The Connect server URL is accessible from compute-hub over the tailnet.
      connectHost: http://connect.nwlnexus.net
      vaults:
        Dev: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: eso-op-connect-token
            namespace: external-secrets
            key: token
