apiVersion: trident.qnap.io/v1
kind: TridentBackendConfig
metadata:
  name: qnap-compute-hub
  namespace: trident
spec:
  version: 1
  storageDriverName: qnap-nas
  backendName: compute-hub
  networkInterfaces: []
  userCHAP: true
  credentials:
    name: qnap-csi-creds
  storage:
    - serviceLevel: storage
      labels:
        performance: storage
