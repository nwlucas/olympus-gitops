apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ingressClass:
      name: traefik
      isDefaultClass: true
    providers:
      kubernetesCRD:
        ingressClass: traefik
      kubernetesIngress:
        ingressClass: traefik
    ports:
      web:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
      websecure:
        tls:
          enabled: true
    api:
      dashboard: true
    logs:
      general:
        level: INFO
    tracing:
      otlp:
        enabled: true
        grpc:
          enabled: true
          endpoint: opentelemetry-collector.otel.svc.cluster.local:4317
          insecure: true
