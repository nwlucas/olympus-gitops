apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obsidian
  namespace: obsidian
spec:
  interval: 1h
  chart:
    spec:
      chart: obsidian
      version: "0.1.5"
      sourceRef:
        kind: HelmRepository
        name: extreme-structure
        namespace: obsidian
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    env:
      timezone: "America/New_York"
      title: "Obsidian"

    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 10Gi

    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi

    ingress:
      enabled: false
