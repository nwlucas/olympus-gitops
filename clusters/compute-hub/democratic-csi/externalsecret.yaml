apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: qnap-iscsi-creds
  namespace: democratic-csi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: qnap-iscsi-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # 1Password item: compute-hub-qnap-iscsi (created after QNAP iSCSI target setup)
    - secretKey: portal-host
      remoteRef:
        key: compute-hub-qnap-iscsi
        property: portal_host
    - secretKey: iqn-prefix
      remoteRef:
        key: compute-hub-qnap-iscsi
        property: iqn_prefix
    - secretKey: username
      remoteRef:
        key: compute-hub-qnap-iscsi
        property: username
    - secretKey: password
      remoteRef:
        key: compute-hub-qnap-iscsi
        property: password
