apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: qnap-iscsi
  # NOT default: compute-hub already has local-path and longhorn as default classes.
  # Workloads must request storageClassName: qnap-iscsi explicitly.
provisioner: csi.trident.qnap.io
parameters:
  selector: "location=compute-hub"
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
