apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer-agent
  namespace: portainer
spec:
  interval: 1h
  install:
    timeout: 10m
    remediation:
      retries: 3
  chart:
    spec:
      chart: portainer-agent
      version: "1.0.57"
      sourceRef:
        kind: HelmRepository
        name: portainer
        namespace: portainer
