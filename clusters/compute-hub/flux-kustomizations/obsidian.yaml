apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obsidian
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/compute-hub/obsidian
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager-config
    - name: longhorn
