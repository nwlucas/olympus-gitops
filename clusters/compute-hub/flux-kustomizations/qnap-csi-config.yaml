apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qnap-csi-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/compute-hub/qnap-csi-config
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: qnap-csi
