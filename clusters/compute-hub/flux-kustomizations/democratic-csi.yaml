apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: democratic-csi
  namespace: flux-system
spec:
  # Suspended until compute-hub-qnap-iscsi exists in 1Password.
  # Once the item is populated, resume with:
  #   flux resume kustomization democratic-csi --context compute-hub
  suspend: true
  interval: 10m
  path: ./clusters/compute-hub/democratic-csi
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets-config
    - name: longhorn
