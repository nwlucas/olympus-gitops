apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qnap-csi
  namespace: flux-system
spec:
  # Suspended until compute-hub-qnap-iscsi is populated in 1Password.
  # Resume with: flux resume kustomization qnap-csi --context compute-hub
  suspend: true
  interval: 10m
  path: ./clusters/compute-hub/qnap-csi
  prune: true
  wait: true
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets-config
